name: CI — B2B Lead Intelligence

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate & Audit Page
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check app.js syntax
        run: node --check app.js

      - name: Verify index.html exists
        run: test -f index.html

      - name: Check for exposed API keys
        run: |
          if grep -r 'sk-[a-zA-Z0-9]' --include='*.js' --include='*.html' . | grep -v node_modules | grep -v '.vercel'; then
            echo '❌ Potential API key exposure detected!'
            exit 1
          else
            echo '✅ No exposed API keys found'
          fi

      - name: Lighthouse CI Action
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/index.html
          staticDistDir: .
          uploadArtifacts: true
          temporaryPublicStorage: true
